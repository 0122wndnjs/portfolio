<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }

      body {
        width: 1800px;
        height: 1000px;
        background: #0F0E0C;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* Subtle warm vignette */
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.03) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 50%, rgba(245,240,232,0.015) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        display: flex;
      }

      /* ── LEFT ── */
      .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 120px 0 140px;
        border-right: 1px solid rgba(245,240,232,0.06);
      }

      .name-block { margin-bottom: 20px; }

      .name {
        font-size: 100px;
        font-weight: 900;
        letter-spacing: -4px;
        line-height: 0.95;
        color: #F5F0E8;
        display: block;
      }

      .role {
        font-size: 22px;
        font-weight: 300;
        color: rgba(245,240,232,0.3);
        letter-spacing: 0.05em;
        margin-top: 22px;
        text-transform: uppercase;
      }

      .sep {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 52px 0;
      }

      .sep-line {
        width: 32px;
        height: 1px;
        background: rgba(245,158,11,0.5);
      }

      .sep-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(245,158,11,0.4);
      }

      .contact {
        display: flex;
        flex-direction: column;
        gap: 26px;
      }

      .contact-item {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .contact-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        opacity: 0.9;
      }

      .contact-icon svg { width: 28px; height: 28px; }

      .contact-label {
        font-size: 24px;
        font-weight: 400;
        color: rgba(245,240,232,0.45);
        letter-spacing: -0.01em;
      }

      .contact-label.amber { color: rgba(245,158,11,0.85); }

      /* ── RIGHT ── */
      .right {
        width: 620px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: rgba(245,240,232,0.01);
        padding: 0 110px;
      }

      .qr-wrap {
        padding: 20px;
        background: #F5F0E8;
        box-shadow: 0 0 0 1px rgba(245,240,232,0.06), 0 32px 64px rgba(0,0,0,0.5);
      }

      .scan-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(245,240,232,0.15);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- LEFT -->
      <div class="left">
        <div class="name-block">
          <span class="name">JOOWON KIM</span>
          <div class="role">Full-Stack Developer & Web3 Builder</div>
        </div>

        <div class="sep">
          <div class="sep-line"></div>
          <div class="sep-dot"></div>
        </div>

        <div class="contact">
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="2" y="4" width="20" height="16" rx="2" stroke="#EA4335" stroke-width="1.5"/>
                <path d="M2 7l10 7 10-7" stroke="#EA4335" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="contact-label">0122wndnjs@gmail.com</span>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="#229ED9">
                <path d="M9.993 15.23l-.396 5.57c.566 0 .81-.244 1.103-.537l2.644-2.53 5.48 4.01c1.004.554 1.718.263 1.97-.93l3.57-16.73c.297-1.388-.502-1.93-1.49-1.56L1.8 9.72c-1.35.52-1.33 1.27-.23 1.61l5.38 1.68L19.34 5.6c.58-.37 1.11-.17.68.2"/>
              </svg>
            </div>
            <span class="contact-label">@wndnjs0122</span>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" stroke="rgba(245,240,232,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="contact-label">github.com/0122wndnjs</span>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#F59E0B" stroke-width="1.5"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="#F59E0B" stroke-width="1.5"/>
              </svg>
            </div>
            <span class="contact-label">joowonkim<span style="color:#F59E0B;">.me</span></span>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="qr-wrap">
          <div id="qr-container"></div>
        </div>
        <div class="scan-label">SCAN TO VISIT PORTFOLIO</div>
      </div>
    </div>

    <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
    <script>
      new QRCodeStyling({
        width: 360, height: 360,
        data: "https://joowonkim.me",
        dotsOptions:          { type: "dots",          color: "#0F0E0C" },
        backgroundOptions:    { color: "#F5F0E8" },
        cornersSquareOptions: { type: "extra-rounded", color: "#0F0E0C" },
        cornersDotOptions:    { type: "dot",           color: "#F59E0B" },
      }).append(document.getElementById("qr-container"));
    </script>
  </body>
</html>
